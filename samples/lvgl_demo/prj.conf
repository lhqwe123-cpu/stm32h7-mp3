# DEBUG
CONFIG_STM32_ENABLE_DEBUG_SLEEP_STOP=y

# Logging buffer configuration
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG=y

# Enable FPU support
CONFIG_FPU=y

# DISPLAY/LTDC
CONFIG_DISPLAY=y
CONFIG_STM32_LTDC_RGB565=y
CONFIG_STM32_LTDC_FB_NUM=1

# PRINTK
CONFIG_PRINTK=y

# SDRAM
CONFIG_MEMC=y
CONFIG_MEMC_STM32=y
CONFIG_MEMC_STM32_SDRAM=y

# SDcard
CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_LOG=y
CONFIG_SDMMC_STM32_CLOCK_CHECK=n
CONFIG_SDMMC_STM32_HWFC=y

# FATFS
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_FILE_SYSTEM_SHELL=n
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y
CONFIG_FS_FATFS_MAX_LFN=255
CONFIG_FILE_SYSTEM_MAX_FILE_NAME=255

# STACK 
CONFIG_MAIN_STACK_SIZE=32768

# GPIO
CONFIG_GPIO=y

# ============================================================
# MCUboot Support Configuration
# ============================================================
# Enable MCUboot bootloader support
CONFIG_BOOTLOADER_MCUBOOT=y

# Enable img_mgmt for firmware upgrade management
CONFIG_IMG_MANAGER=y

# Enable MCUboot bootutil library
CONFIG_MCUBOOT_BOOTUTIL_LIB=y

# Flash operation support
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Enable MPU to allow Flash write (required for ARM platforms)
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Use DT code partition (required by MCUboot)
CONFIG_USE_DT_CODE_PARTITION=y

# Enable Flash Map
CONFIG_FLASH_MAP=y

# Enable Stream Flash (for firmware writing)
CONFIG_STREAM_FLASH=y

# Enable CRC checksum
CONFIG_CRC=y

# Heap memory pool size for firmware upgrade
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Software reboot support
CONFIG_REBOOT=y

# ============================================================
# UART OTA Support Configuration
# ============================================================
# Enable UART async API (DMA-based reception)
CONFIG_UART_ASYNC_API=y
CONFIG_SERIAL=y
# Enable DMA support
CONFIG_DMA=y

# DMA must init before UART (default DMA=40, UART=50 -> swap)
CONFIG_DMA_INIT_PRIORITY=30
CONFIG_DMAMUX_STM32_INIT_PRIORITY=31

# Non-cacheable memory for DMA buffers
CONFIG_NOCACHE_MEMORY=y

# Enable ring buffer for UART data buffering
CONFIG_RING_BUFFER=y

