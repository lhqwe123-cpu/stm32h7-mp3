# ============================================================
# Project: STM32H743IIT6 LVGL + MCUboot Application
# Board:  stm32h743iit6
# ============================================================

# ============================================================
# 1. Platform Core
# ============================================================
CONFIG_FPU=y
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_MAIN_STACK_SIZE=4096

# ============================================================
# 2. Logging & Debug
# ============================================================
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_STM32_ENABLE_DEBUG_SLEEP_STOP=y
# ============================================================
# 3. Console & Shell
# ============================================================
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_FILE_SYSTEM_SHELL=y

# ============================================================
# 4. Peripheral Drivers
# ============================================================
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_DMA=y
CONFIG_DMA_INIT_PRIORITY=30
CONFIG_DMAMUX_STM32_INIT_PRIORITY=31

# ============================================================
# 5. Display (LTDC + SDRAM)
# ============================================================
CONFIG_DISPLAY=y
CONFIG_STM32_LTDC_RGB565=y
CONFIG_STM32_LTDC_FB_NUM=1

CONFIG_MEMC=y
CONFIG_MEMC_STM32=y
CONFIG_MEMC_STM32_SDRAM=y

# ============================================================
# 6. SD Card & FAT Filesystem
# ============================================================
CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FILE_SYSTEM_MAX_FILE_NAME=255

CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y
CONFIG_FS_FATFS_MAX_LFN=255

CONFIG_SDMMC_STM32_HWFC=y
CONFIG_SDMMC_STM32_CLOCK_CHECK=n

# ============================================================
# 7. LVGL (Zephyr Module, v9.x)
# ============================================================
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_MEM_POOL_SIZE=65535
CONFIG_LV_DEF_REFR_PERIOD=16

# -- Double VDB (tear-free rendering) --
CONFIG_LV_Z_DOUBLE_VDB=y
CONFIG_LV_Z_VDB_SIZE=10

# -- Performance monitoring --
CONFIG_LV_USE_SYSMON=y
CONFIG_LV_USE_PERF_MONITOR=y

# ----------------------------------------------------------
# 7a. LVGL Fonts (keep only montserrat_14)
# ----------------------------------------------------------
CONFIG_LV_FONT_MONTSERRAT_8=n
CONFIG_LV_FONT_MONTSERRAT_10=n
CONFIG_LV_FONT_MONTSERRAT_12=n
CONFIG_LV_FONT_MONTSERRAT_16=n
CONFIG_LV_FONT_MONTSERRAT_18=n
CONFIG_LV_FONT_MONTSERRAT_20=n
CONFIG_LV_FONT_MONTSERRAT_22=n
CONFIG_LV_FONT_MONTSERRAT_24=n
CONFIG_LV_FONT_MONTSERRAT_26=n
CONFIG_LV_FONT_MONTSERRAT_28=n
CONFIG_LV_FONT_MONTSERRAT_30=n
CONFIG_LV_FONT_MONTSERRAT_32=n
CONFIG_LV_FONT_MONTSERRAT_34=n
CONFIG_LV_FONT_MONTSERRAT_36=n
CONFIG_LV_FONT_MONTSERRAT_38=n
CONFIG_LV_FONT_MONTSERRAT_40=n
CONFIG_LV_FONT_MONTSERRAT_42=n
CONFIG_LV_FONT_MONTSERRAT_44=n
CONFIG_LV_FONT_MONTSERRAT_46=n
CONFIG_LV_FONT_MONTSERRAT_48=n
CONFIG_LV_FONT_UNSCII_8=n
CONFIG_LV_FONT_UNSCII_16=n
CONFIG_LV_FONT_DEJAVU_16_PERSIAN_HEBREW=n
CONFIG_LV_FONT_SOURCE_HAN_SANS_SC_14_CJK=n
CONFIG_LV_FONT_SOURCE_HAN_SANS_SC_16_CJK=n

# ----------------------------------------------------------
# 7b. LVGL Widgets (keep: button, label, image, slider,
#     list, switch, bar, arc, textarea)
# ----------------------------------------------------------
CONFIG_LV_USE_ANIMIMG=n
CONFIG_LV_USE_ARCLABEL=n
CONFIG_LV_USE_CALENDAR=n
CONFIG_LV_USE_CALENDAR_HEADER_ARROW=n
CONFIG_LV_USE_CALENDAR_HEADER_DROPDOWN=n
CONFIG_LV_USE_CANVAS=n
CONFIG_LV_USE_CHART=n
CONFIG_LV_USE_CHECKBOX=n
CONFIG_LV_USE_DROPDOWN=n
CONFIG_LV_USE_IMAGEBUTTON=n
CONFIG_LV_USE_KEYBOARD=n
CONFIG_LV_USE_LED=n
CONFIG_LV_USE_LINE=n
CONFIG_LV_USE_MENU=n
CONFIG_LV_USE_MSGBOX=n
CONFIG_LV_USE_ROLLER=n
CONFIG_LV_USE_SCALE=n
CONFIG_LV_USE_SPAN=n
CONFIG_LV_USE_SPINBOX=n
CONFIG_LV_USE_SPINNER=n
CONFIG_LV_USE_TABLE=n
CONFIG_LV_USE_TABVIEW=n
CONFIG_LV_USE_TILEVIEW=n
CONFIG_LV_USE_WIN=n

# ----------------------------------------------------------
# 7c. LVGL Themes (keep only default)
# ----------------------------------------------------------
CONFIG_LV_USE_THEME_SIMPLE=n

# ----------------------------------------------------------
# 7d. LVGL Libraries (none needed)
# ----------------------------------------------------------
CONFIG_LV_USE_BARCODE=n
CONFIG_LV_USE_BMP=n
CONFIG_LV_USE_GIF=n
CONFIG_LV_USE_FFMPEG=n
CONFIG_LV_USE_FREETYPE=n
CONFIG_LV_USE_LODEPNG=n
CONFIG_LV_USE_LIBPNG=n
CONFIG_LV_USE_LIBJPEG_TURBO=n
CONFIG_LV_USE_LIBWEBP=n
CONFIG_LV_USE_TJPGD=n
CONFIG_LV_USE_TINY_TTF=n
CONFIG_LV_USE_QRCODE=n
CONFIG_LV_USE_RLOTTIE=n
CONFIG_LV_USE_SVG=n
CONFIG_LV_USE_LZ4=n
CONFIG_LV_USE_RLE=n

# ----------------------------------------------------------
# 7e. LVGL Filesystem Drivers (use Zephyr FATFS directly)
# ----------------------------------------------------------
CONFIG_LV_USE_FS_FATFS=n
CONFIG_LV_USE_FS_STDIO=n
CONFIG_LV_USE_FS_POSIX=n
CONFIG_LV_USE_FS_WIN32=n
CONFIG_LV_USE_FS_MEMFS=n
CONFIG_LV_USE_FS_LITTLEFS=n

# ----------------------------------------------------------
# 7f. LVGL GPU Backends (only DMA2D + SW needed)
# ----------------------------------------------------------
CONFIG_LV_USE_DRAW_EVE=n
CONFIG_LV_USE_DRAW_VG_LITE=n
CONFIG_LV_USE_DRAW_SDL=n
CONFIG_LV_USE_DRAW_DAVE2D=n
CONFIG_LV_USE_PXP=n
CONFIG_LV_USE_G2D=n
CONFIG_LV_USE_PPA=n
CONFIG_LV_USE_DRAW_OPENGLES=n

# ----------------------------------------------------------
# 7g. LVGL Debug / Misc (not needed)
# ----------------------------------------------------------
CONFIG_LV_USE_MONKEY=n
CONFIG_LV_USE_TEST=n
CONFIG_LV_USE_FILE_EXPLORER=n
CONFIG_LV_USE_FRAGMENT=n
CONFIG_LV_USE_GRIDNAV=n
CONFIG_LV_USE_IME_PINYIN=n
CONFIG_LV_USE_LOTTIE=n
CONFIG_LV_USE_3DTEXTURE=n
CONFIG_LV_USE_OBJ_PROPERTY=n

# ============================================================
# 8. UART OTA (YModem Protocol, DMA-based)
# ============================================================
CONFIG_UART_ASYNC_API=y
CONFIG_NOCACHE_MEMORY=y
CONFIG_RING_BUFFER=y

# ============================================================
# 9. MCUboot Bootloader & Firmware Upgrade
# ============================================================
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_BOOTUTIL_LIB=y
CONFIG_USE_DT_CODE_PARTITION=y

# -- Flash operations --
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# -- Utilities --
CONFIG_CRC=y
CONFIG_REBOOT=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
